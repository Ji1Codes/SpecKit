<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SpecKit Snake Game</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Snake game custom styles */
        body {
            background: linear-gradient(135deg, #192d42, #3e4568 70%);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 0;
            margin: 0;
            height: 100vh;
        }
        .snake-container {
            margin-top: 48px;
            background: rgba(255,255,255,0.07);
            box-shadow: 0 8px 32px rgba(41,64,119,0.22);
            border-radius: 30px;
            padding: 36px 32px 28px 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #snakeCanvas {
            background: #26446d;
            border-radius: 18px;
            box-shadow: 0 4px 16px rgba(12,18,32,0.20), 0 0 0 4px #ffffff33 inset;
            display: block;
            margin: 0 auto 16px auto;
            border: none;
            transition: filter 0.2s;
        }
        .score-board {
            color: #dde7fb;
            font-size: 1.4em;
            font-weight: bold;
            background: #2f3d61;
            border-radius: 8px;
            padding: 6px 16px;
            margin-bottom: 12px;
            box-shadow: 0 1px 5px #232f460f;
            letter-spacing: 0.07em;
            user-select: none;
        }
        .instructions {
            color: #a0c1f8;
            font-size: 1em;
            margin-bottom: 20px;
            margin-top: 0;
            text-align: center;
        }
        .game-over {
            color: #ff477d;
            font-size: 1.7em;
            font-weight: bold;
            text-shadow: 0 2px 12px #ffffff77;
        }
        .restart-btn {
            margin-top: 18px;
            background: linear-gradient(90deg,#339aee,#477bfa);
            color: #fff;
            font-size: 1.2em;
            font-weight: bold;
            padding: 10px 32px;
            border: none;
            border-radius: 14px;
            box-shadow: 0 2px 12px #1956a015;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
        }
        .restart-btn:hover {
            background: linear-gradient(90deg,#477bfa,#339aee);
            box-shadow: 0 4px 20px #1956a040;
        }
    </style>
</head>
<body>
    <div class="snake-container">
        <h2 class="instructions">
            Use <b>Arrow Keys</b> or <b>WASD</b> to move your snake &mdash; <br>
            Eat pink food, avoid walls & grow!
        </h2>
        <div class="score-board">
            Score: <span id="score">0</span>
        </div>
        <canvas id="snakeCanvas" width="400" height="400"></canvas>
        <div id="gameOver" class="game-over" style="display:none;">Game Over!</div>
        <button id="restartBtn" class="restart-btn" style="display:none;">Restart</button>
    </div>
    <script>
        // --- Snake Game code ---
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');

        // --- Game settings ---
        const gridSize = 20;  // Board: 20x20
        const tileSize = canvas.width / gridSize;
        const snakeColor = "#5de1ec";
        const snakeHeadColor = "#fff";
        const snakeShadow = "#3193b3";
        const foodColor = "#ff477d";
        const foodShadow = "#d51557";
        const bgGridColor = "#293a59";
        const bgDark = "#26446d";
        const bgLight = "#395e8b";

        // --- State ---
        let snake, food, direction, nextDirection, score, alive, gameInterval;

        // --- Start game ---
        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            alive = true;
            food = placeFood();
            updateScoreBoard();
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('restartBtn').style.display = 'none';
            clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, 160); // SLOWER for easier play
        }

        function updateScoreBoard() {
            document.getElementById('score').textContent = score;
        }

        // --- Draw bg grid ---
        function drawBgGrid() {
            for(let x=0;x<gridSize;x++) {
                for(let y=0;y<gridSize;y++) {
                    ctx.fillStyle = ((x+y)%2===0) ? bgLight : bgDark;
                    ctx.fillRect(x*tileSize, y*tileSize, tileSize, tileSize);
                }
            }
        }

        // --- Draw snake ---
        function drawSnake() {
            snake.forEach((cell, i) => {
                ctx.save();
                ctx.shadowColor = snakeShadow;
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.arc(
                    cell.x * tileSize + tileSize/2,
                    cell.y * tileSize + tileSize/2,
                    i === 0 ? tileSize * 0.45 : tileSize * 0.38,
                    0, 2*Math.PI
                );
                ctx.fillStyle = i === 0 ? snakeHeadColor : snakeColor;
                ctx.globalAlpha = i === 0 ? 1 : 0.88;
                ctx.fill();
                ctx.restore();

                // Add "eye" for head
                if(i === 0){
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(
                        cell.x * tileSize + tileSize/2 + tileSize*0.12, 
                        cell.y * tileSize + tileSize/2 - tileSize*0.07,
                        tileSize * 0.11, 0, 2*Math.PI
                    );
                    ctx.fillStyle = "#4ad1fa";
                    ctx.globalAlpha = 0.93;
                    ctx.fill();
                    ctx.restore();
                }
            });
        }

        // --- Draw food ---
        function drawFood() {
            ctx.save();
            ctx.shadowColor = foodShadow;
            ctx.shadowBlur = 9;
            ctx.beginPath();
            ctx.arc(
                food.x * tileSize + tileSize/2,
                food.y * tileSize + tileSize/2,
                tileSize * 0.36,
                0, 2*Math.PI
            );
            ctx.fillStyle = foodColor;
            ctx.globalAlpha = 0.93;
            ctx.fill();
            ctx.restore();

            // Add sparkle
            ctx.save();
            ctx.globalAlpha = 0.16;
            ctx.beginPath();
            ctx.arc(
                food.x * tileSize + tileSize/2 + tileSize*0.14,
                food.y * tileSize + tileSize/2 - tileSize*0.12,
                tileSize*0.11, 0, 2*Math.PI
            );
            ctx.fillStyle = "#fff";
            ctx.fill();
            ctx.restore();
        }

        function gameLoop() {
            if (!alive) return;

            // Move snake
            let head = { ...snake[0] };
            switch (nextDirection) {
                case 'left':  head.x -= 1; break;
                case 'right': head.x += 1; break;
                case 'up':    head.y -= 1; break;
                case 'down':  head.y += 1; break;
            }
            direction = nextDirection;

            // Check wall collision
            if(head.x < 0 || head.x >= gridSize || head.y < 0 || head.y >= gridSize){
                return gameOver();
            }

            // Check self collision
            if(snake.some(c => c.x === head.x && c.y === head.y)){
                return gameOver();
            }

            snake.unshift(head);

            // Check food
            if(head.x === food.x && head.y === food.y){
                score += 1;
                food = placeFood();
                updateScoreBoard();
            }else{
                snake.pop(); // Remove tail
            }

            // Draw everything
            ctx.clearRect(0,0,canvas.width,canvas.height);
            drawBgGrid();
            drawFood();
            drawSnake();
        }

        function gameOver() {
            alive = false;
            clearInterval(gameInterval);
            document.getElementById('gameOver').style.display = '';
            document.getElementById('restartBtn').style.display = '';
        }

        // --- Place food not on snake ---
        function placeFood() {
            let pos;
            do {
                pos = {
                    x: Math.floor(Math.random() * gridSize),
                    y: Math.floor(Math.random() * gridSize)
                };
            } while (snake && snake.some(c => c.x === pos.x && c.y === pos.y));
            return pos;
        }

        // --- Controls ---
        document.addEventListener('keydown', e => {
            if (!alive && (e.key === "Enter" || e.key === " ")) {
                initGame();
                return;
            }
            let key = e.key.toLowerCase();
            let dir = direction;
            // Prevent reversal
            let map = { 'arrowleft':'left','a':'left',
                        'arrowright':'right','d':'right',
                        'arrowup':'up','w':'up',
                        'arrowdown':'down','s':'down' };
            if(map[key]){
                let newDir = map[key];
                if((dir === 'left' && newDir === 'right') ||
                   (dir === 'right' && newDir === 'left') ||
                   (dir === 'up' && newDir === 'down') ||
                   (dir === 'down' && newDir === 'up')) return;
                nextDirection = newDir;
            }
        });

        // --- Restart button ---
        document.getElementById('restartBtn').onclick = () => { initGame(); };

        // --- Start ---
        initGame();
    </script>
</body>
</html>
